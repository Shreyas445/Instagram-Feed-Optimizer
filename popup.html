<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Customizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url('https://source.unsplash.com/1600x900/?night,stars,mountains') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Gradient Title */
        .title {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Glowing Box */
        .customizer-box {
            width: 80%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.5);
        }

        /* Glowing Border */
        .customizer-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 15px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b, #ffbb33, #ff416c);
            z-index: -1;
            filter: blur(10px);
        }

        .customizer-box h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        /* Preferences Section */
        .preferences {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        /* Preference Button */
        .preference {
            display: flex;
            align-items: center;
            background: #ff4b2b;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 400;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .preference:hover {
            background: #d4371c;
        }

        /* Close Button */
        .close-btn {
            background: white;
            color: red;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: red;
            color: white;
        }

        /* Add Button */
        .add-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Divider */
        .divider {
            height: 2px;
            width: 100%;
            background: linear-gradient(to right, rgba(255, 100, 100, 0.8), rgba(255, 255, 255, 0.2));
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <!-- Gradient Title -->
    <div class="title">Feed Filler</div>

    <!-- Customizer Box -->
    <div class="customizer-box">
        <h2>Feed Customizer</h2>

        <!-- Maximum Preference -->
        <h3>Maximum Preference</h3>
        <div class="preferences">
            <div class="preference">Vlog <span class="close-btn">×</span></div>
            <div class="preference">Gym <span class="close-btn">×</span></div>
            <div class="preference">Motivation <span class="close-btn">×</span></div>
            <div class="preference">Cars <span class="close-btn">×</span></div>
            <div class="preference">Cooking <span class="close-btn">×</span></div>
            <div class="preference">Motovlog <span class="close-btn">×</span></div>
            <div class="add-btn">Add <b>+</b></div>
        </div>

        <div class="divider"></div>

        <!-- Minimum Preference -->
        <h3>Minimum Preference</h3>
        <div class="preferences">
            <div class="preference">Dance <span class="close-btn">×</span></div>
            <div class="preference">Girls <span class="close-btn">×</span></div>
            <div class="preference">Love Failure <span class="close-btn">×</span></div>
            <div class="add-btn">Add <b>+</b></div>
        </div>
    </div>

</body>
</html>
